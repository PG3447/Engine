input:
  keyboard:
    move_right: [GLFW_KEY_D]
    move_left: [GLFW_KEY_A]
    move_up: [GLFW_KEY_W]
    move_down: [GLFW_KEY_S]
    move_right1: [GLFW_KEY_RIGHT]
    move_left1: [GLFW_KEY_LEFT]
    move_up1: [GLFW_KEY_UP]
    move_down1: [GLFW_KEY_DOWN]
    toggle_culling: [GLFW_KEY_C]
    raycast_debug: [GLFW_KEY_R]
    anim_play_dying: [GLFW_KEY_1]
    anim_play_jump: [GLFW_KEY_2]
    anim_slow_mo: [GLFW_KEY_3]
    anim_fast_forward: [GLFW_KEY_4]
    gamma_up: [GLFW_KEY_0]
    gamma_down: [GLFW_KEY_9]
  mouse:
    move_right: [GLFW_MOUSE_BUTTON_LEFT]
    right_click: [GLFW_MOUSE_BUTTON_RIGHT]
  gamepad:
    move_right:
      - {button: GLFW_GAMEPAD_BUTTON_SQUARE, id: 0}
    move_right_1:
      - {button: GLFW_GAMEPAD_BUTTON_SQUARE, id: 1}
